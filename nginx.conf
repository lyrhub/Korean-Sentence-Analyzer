upstream parse {
    server 127.0.0.1:1337;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Parse REST API + LiveQuery WebSocket. Parse runs in the same container
    # (single-container promote) on 127.0.0.1:1337, mounted at /parse.
    # `location /parse` has NO trailing slash on purpose: it must match BOTH
    # the bare `/parse` (the LiveQuery WS URL the client opens) AND `/parse/...`
    # (REST). With `location /parse/`, nginx 301-redirects the bare `/parse`,
    # and WebSocket clients don't follow redirects → the LiveQuery handshake
    # fails. proxy_pass has no URI part so the full `/parse...` is preserved.
    location /parse {
        proxy_pass http://parse;
        proxy_http_version 1.1;
        # Forward LiveQuery WebSocket upgrades to the Parse LiveQuery server.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
